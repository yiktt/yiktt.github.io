<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韭菜 - 个人主页</title>
<meta name="description" content="韭菜的个人主页 · 风从远方来">
<meta name="theme-color" content="#0a0e12">
<script>
/* 主题预渲染：暗色优先，避免闪烁（须内联，先于样式加载执行） */
(function () {
  try {
    var saved = localStorage.getItem('home-theme'); /* auto | light | dark */
    var dark;
    if (saved === 'light') dark = false;
    else if (saved === 'dark') dark = true;
    else dark = window.matchMedia('(prefers-color-scheme: dark)').matches || saved === null;
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.20/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.20/700.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 主题切换：自动 → 浅色 → 深色 -->
<button id="themeToggle" class="theme-toggle" type="button" data-mode="auto" aria-label="切换主题" title="主题：自动">
  <svg class="icon-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <rect x="2" y="3" width="20" height="14" rx="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line>
  </svg>
  <svg class="icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
  </svg>
  <svg class="icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
  </svg>
</button>

<!-- 状态栏 -->
<div class="statusbar" role="status">
  <span class="dot" aria-hidden="true"></span>
  <span class="on">System.Online</span>
  <span class="sep">//</span>
  <span>UTC+8</span>
  <span class="sep">//</span>
  <span id="clock">--:--:--</span>
</div>

<main class="card">
  <div class="head">
    <img class="avatar" src="https://cdn.jsdelivr.net/gh/yiktt/cdn/img/avatars.png" alt="韭菜的头像">
    <div class="identity">
      <div class="name-row">
        <h1>韭菜</h1>
        <span class="lv">Lv.99</span>
      </div>
      <p class="tagline"><span class="cmt">//</span> 风从远方来</p>
    </div>
  </div>

  <hr class="divider">

  <!-- 一言：仅文学(d) + 诗词(i) -->
  <section class="hitokoto" id="hitokoto" aria-label="一言">
    <div class="prompt-line">
      <span class="p">$</span>
      <span>cat ./poetry.log</span>
      <button class="refresh" id="hitokotoRefresh" type="button" aria-label="换一句" title="换一句">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path><path d="M21 3v6h-6"></path>
        </svg>
        <span>RELOAD</span>
      </button>
    </div>
    <div class="output">
      <span class="gt" aria-hidden="true">&gt;</span>
      <span class="txt"><span id="hitokotoText">loading…</span><span class="cursor" aria-hidden="true"></span></span>
    </div>
    <p class="from" id="hitokotoFrom"></p>
  </section>

  <hr class="divider">

  <!-- 社交模块 -->
  <nav class="modules" aria-label="社交链接">
    <p class="label">// Connections</p>
    <a href="https://github.com/yiktt" target="_blank" rel="noopener noreferrer" title="访问我的 GitHub 主页">
      <span class="hex">0x01</span>
      <svg class="ico" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
      </svg>
      <span class="txt">GitHub</span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
    <!-- 替换为你的邮箱地址 -->
    <a href="mailto:yiktt@proton.me" title="给我发邮件">
      <span class="hex">0x02</span>
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
      </svg>
      <span class="txt">Email</span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
    <!-- 替换为你的 Telegram 用户名 -->
    <a href="https://t.me/yiktt_bot" target="_blank" rel="noopener noreferrer" title="在 Telegram 联系我">
      <span class="hex">0x03</span>
      <svg class="ico" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"></path>
      </svg>
      <span class="txt">Telegram</span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
  </nav>
</main>

<footer>
  <span class="ai-badge" title="本页面由 AI 协助生成">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 2l2.1 5.6L20 9.7l-5.9 2.1L12 17.4l-2.1-5.6L4 9.7l5.9-2.1L12 2z"></path>
      <path d="M19 15l1 2.6 2.6 1-2.6 1-1 2.6-1-2.6-2.6-1 2.6-1 1-2.6z" opacity=".7"></path>
    </svg>
    <span>Checksum:&nbsp;AI_Generated</span>
    <span class="ok">//&nbsp;OK</span>
  </span>
  <span><span id="year"></span> 韭菜 · 内容仅供参考，禁止转载商用</span>
</footer>

<script src="script.js"></script>
</body>
</html>
